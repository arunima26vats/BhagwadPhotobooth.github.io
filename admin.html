<!DOCTYPE html>
<html>
<head>
    <title>PhotoBooth Admin - Print Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .print-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .print-card { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        img { width: 100%; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 4px; }
        
        /* Button Styles */
        button, .download-link { 
            border: none; 
            padding: 8px 15px; 
            cursor: pointer; 
            border-radius: 4px; 
            margin-top: 10px;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            font-family: sans-serif;
        }

        .delete-btn { background: #ff4757; color: white; }
        .delete-btn:hover { background: #e84118; }

        .download-link { background: #2ecc71; color: white; margin-right: 5px; }
        .download-link:hover { background: #27ae60; }

        .controls { 
            margin-bottom: 20px; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .user-name-tag {
            margin: 5px 0; 
            color: #ff4757; 
            font-size: 1.4rem; 
            text-transform: uppercase;
        }

        /* Styles for cleaner printing */
        @media print {
            .delete-btn, .download-link, .controls, h1 { display: none !important; }
            body { padding: 0; background: white; }
            .print-grid { display: block; }
            .print-card { box-shadow: none; border: none; page-break-after: always; }
        }
    </style>
</head>
<body>
    <h1>🖨️ Admin Print Center</h1>
    
    <div class="controls">
        <div>
            <strong>Total Photos Captured:</strong> <span id="count">0</span>
        </div>
        <button onclick="window.print()" style="background: #2ed573;">Print Page</button>
    </div>

    <div id="print-grid" class="print-grid">Loading photos...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvJ34DT6ITuelaUt5ds1Meh9ncOVlz7eY",
            authDomain: "bhagvad-photobooth.firebaseapp.com",
            projectId: "bhagvad-photobooth",
            storageBucket: "bhagvad-photobooth.firebasestorage.app",
            messagingSenderId: "381385393118",
            appId: "1:381385393118:web:f45a104d7c70e7c9e5534f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Fetch photos from Firestore
        db.collection('booth_shots').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const grid = document.getElementById('print-grid');
            const countEl = document.getElementById('count');
            grid.innerHTML = '';
            countEl.innerText = snapshot.size;

            snapshot.forEach(doc => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'print-card';
                
                const name = data.userName || "Anonymous Guest";
                // Create a clean filename for downloading
                const fileName = `${name.replace(/\s+/g, '_')}_strip.jpg`;
                
                card.innerHTML = `
                    <img src="${data.imageData}">
                    <h3 class="user-name-tag">${name}</h3>
                    <p style="font-size: 10px; color: #888; margin: 0;">ID: ${data.stripId}</p>
                    
                    <div style="margin-top: 10px;">
                        <a href="${data.imageData}" download="${fileName}" class="download-link">
                            Download
                        </a>
                        <button class="delete-btn" onclick="deletePhoto('${doc.id}')">
                            Delete
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        });

        function deletePhoto(docId) {
            if(confirm("Delete this photo forever?")) {
                db.collection('booth_shots').doc(docId).delete();
            }
        }
    </script>
</body>
</html>
